<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CapMinds – Appointment Scheduler</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-collapse-row">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#10094;&#10094;</button>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" id="navCalendar" data-view="calendar" aria-label="Calendar">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="3" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <line x1="1" y1="7" x2="17" y2="7" stroke="currentColor" stroke-width="1.5"/>
            <line x1="6" y1="1" x2="6" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="1" x2="12" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="nav-label">Calendar</span>
      </button>
      <button class="nav-item" id="navDashboard" data-view="dashboard" aria-label="Dashboard">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <rect x="11" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <rect x="1" y="11" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <rect x="11" y="11" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
          </svg>
        </span>
        <span class="nav-label">Dashboard</span>
      </button>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main-wrapper" id="mainWrapper">

    <!-- Header: Logo left, Book Appointment right -->
    <header class="app-header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="4" width="30" height="30" rx="3" fill="#D32F2F" transform="rotate(45 19 19)"/>
            <polyline points="15.5,13.5 22,19 15.5,24.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <span class="logo-text">CAPMINDS</span>
      </div>
      <button class="btn-book" id="btnBookAppointment">+ Book Appointment</button>
    </header>

    <!-- Calendar View -->
    <section class="view" id="viewCalendar">
      <div class="calendar-header">
        <div class="cal-nav">
          <button class="cal-nav-btn" id="calPrev">&#8249;</button>
          <span class="cal-month-label" id="calMonthLabel">January 18, 2023</span>
          <button class="cal-nav-btn" id="calNext">&#8250;</button>
        </div>
        <div class="cal-actions">
          <button class="btn-today" id="btnToday">Today</button>
          <div class="view-select-wrap">
            <select id="calViewSelect" class="view-select">
              <option value="month">Month</option>
              <option value="week">Week</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Month View -->
      <div class="calendar-grid-wrap" id="calMonthView">
        <div class="cal-grid">
          <div class="cal-day-header"><span class="day-full">Sunday</span><span class="day-short">Su</span></div>
          <div class="cal-day-header"><span class="day-full">Monday</span><span class="day-short">Mo</span></div>
          <div class="cal-day-header"><span class="day-full">Tuesday</span><span class="day-short">Tu</span></div>
          <div class="cal-day-header"><span class="day-full">Wednesday</span><span class="day-short">We</span></div>
          <div class="cal-day-header"><span class="day-full">Thursday</span><span class="day-short">Th</span></div>
          <div class="cal-day-header friday"><span class="day-full">Friday</span><span class="day-short">Fr</span></div>
          <div class="cal-day-header"><span class="day-full">Saturday</span><span class="day-short">Sa</span></div>
        </div>
        <div class="cal-body" id="calBody"></div>
      </div>

      <!-- Week View -->
      <div class="calendar-week-wrap hidden" id="calWeekView">
        <div class="week-grid" id="weekGrid"></div>
      </div>
    </section>

    <!-- Dashboard View -->
    <section class="view hidden" id="viewDashboard">
      <h2 class="dashboard-title">Practice Dashboard</h2>
      <div class="filter-bar">
        <div class="search-wrap">
          <span class="search-icon">&#128269;</span>
          <input type="text" id="searchPatient" class="search-input" placeholder="Patient Search" />
        </div>
        <div class="search-wrap">
          <span class="search-icon">&#128269;</span>
          <input type="text" id="searchDoctor" class="search-input" placeholder="Doctor Search" />
        </div>
        <div class="date-range-wrap">
          <input type="date" id="filterDateFrom" class="date-input" />
          <span class="date-sep">–</span>
          <input type="date" id="filterDateTo" class="date-input" />
        </div>
        <button class="btn-update" id="btnUpdate">Update</button>
      </div>

      <div class="table-section">
        <h3 class="table-title">Appointment Details</h3>
        <div class="table-wrap">
          <table class="appt-table" id="apptTable">
            <thead>
              <tr>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Hospital</th>
                <th>Specialty</th>
                <th>Select Date</th>
                <th>Select Time</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="apptTableBody"></tbody>
          </table>
          <div class="empty-state" id="emptyState">No appointments found.</div>
        </div>
      </div>
    </section>

  </div><!-- /main-wrapper -->

  <!-- Schedule Appointment Modal -->
  <div class="modal-overlay hidden" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Schedule Appointment</h3>
        <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      </div>
      <form class="modal-form" id="apptForm" novalidate>
        <input type="hidden" id="editId" />
        <div class="form-row">
          <div class="form-group">
            <span class="field-icon">&#128100;</span>
            <input type="text" id="fPatient" placeholder="Patient Name" class="form-input" />
            <span class="field-err" id="errPatient"></span>
          </div>
          <div class="form-group">
            <span class="field-icon">&#128104;&#8205;&#9877;&#65039;</span>
            <input type="text" id="fDoctor" placeholder="Doctor Name" class="form-input" />
            <span class="field-err" id="errDoctor"></span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <span class="field-icon">&#127973;</span>
            <input type="text" id="fHospital" placeholder="Hospital Name" class="form-input" />
            <span class="field-err" id="errHospital"></span>
          </div>
          <div class="form-group">
            <span class="field-icon">&#9877;</span>
            <select id="fSpecialty" class="form-input form-select">
              <option value="" disabled selected>Specialty</option>
              <option>Dermatology</option>
              <option>Cardiology</option>
              <option>Neurology</option>
              <option>Orthopedics</option>
              <option>Pediatrics</option>
              <option>General Medicine</option>
              <option>Ophthalmology</option>
              <option>ENT</option>
              <option>Oncology</option>
              <option>Psychiatry</option>
            </select>
            <span class="field-err" id="errSpecialty"></span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <span class="field-icon">&#128197;</span>
            <input type="date" id="fDate" class="form-input date-placeholder" placeholder="Select Date" />
            <span class="field-err" id="errDate"></span>
          </div>
          <div class="form-group">
            <span class="field-icon">&#128336;</span>
            <select id="fTime" class="form-input form-select">
              <option value="" disabled selected>Select Time</option>
              <option value="07:00">7:00 AM</option>
              <option value="07:30">7:30 AM</option>
              <option value="08:00">8:00 AM</option>
              <option value="08:30">8:30 AM</option>
              <option value="09:00">9:00 AM</option>
              <option value="09:30">9:30 AM</option>
              <option value="10:00">10:00 AM</option>
              <option value="10:30">10:30 AM</option>
              <option value="11:00">11:00 AM</option>
              <option value="11:30">11:30 AM</option>
              <option value="12:00">12:00 PM</option>
              <option value="12:30">12:30 PM</option>
              <option value="13:00">1:00 PM</option>
              <option value="13:30">1:30 PM</option>
              <option value="14:00">2:00 PM</option>
              <option value="14:30">2:30 PM</option>
              <option value="15:00">3:00 PM</option>
              <option value="15:30">3:30 PM</option>
              <option value="16:00">4:00 PM</option>
              <option value="16:30">4:30 PM</option>
              <option value="17:00">5:00 PM</option>
              <option value="17:30">5:30 PM</option>
              <option value="18:00">6:00 PM</option>
              <option value="18:30">6:30 PM</option>
              <option value="19:00">7:00 PM</option>
              <option value="19:30">7:30 PM</option>
              <option value="20:00">8:00 PM</option>
            </select>
            <span class="field-err" id="errTime"></span>
          </div>
        </div>
        <div class="form-row single">
          <div class="form-group full">
            <textarea id="fReason" placeholder="Reason" class="form-textarea" rows="3"></textarea>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="btnCancel">Cancel</button>
          <button type="submit" class="btn-save" id="btnSave">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Appointment Detail Modal (view/edit) -->
  <div class="modal-overlay hidden" id="detailOverlay" role="dialog" aria-modal="true">
    <div class="modal detail-modal">
      <div class="modal-header">
        <h3 class="modal-title">Appointment Details</h3>
        <button class="modal-close" id="detailClose" aria-label="Close">&times;</button>
      </div>
      <div class="detail-content" id="detailContent"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="detailEdit">Edit</button>
        <button class="btn-save btn-delete-red" id="detailDelete">Delete</button>
      </div>
    </div>
  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="mobile-nav" id="mobileNav">
    <button class="mobile-nav-btn active" id="mobileNavCalendar" data-view="calendar">
      <span class="mobile-nav-icon">
        <svg width="22" height="22" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="3" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <line x1="1" y1="7" x2="17" y2="7" stroke="currentColor" stroke-width="1.5"/>
          <line x1="6" y1="1" x2="6" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="12" y1="1" x2="12" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="mobile-nav-label">Calendar</span>
    </button>
    <button class="mobile-nav-btn" id="mobileNavDashboard" data-view="dashboard">
      <span class="mobile-nav-icon">
        <svg width="22" height="22" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <rect x="11" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <rect x="1" y="11" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <rect x="11" y="11" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
        </svg>
      </span>
      <span class="mobile-nav-label">Dashboard</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
